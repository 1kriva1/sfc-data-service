apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sfc-data-role-binding
  namespace: sfc
  labels:
    app.kubernetes.io/name: sfc-data
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: sfc
    app.kubernetes.io/instance: production
    app.kubernetes.io/managed-by: kubectl
  annotations:
    owner: "krivorukandrey@gmail.com"
    purpose: "Role binding for Data component in SFC application"
subjects:
  - kind: ServiceAccount
    name: sfc-data-service-account
    namespace: sfc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sfc-data-role