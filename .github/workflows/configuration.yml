#github action to build and test SFC.Data application

name: Build, Test and Push SFC.Data Application

on:
  workflow_dispatch:  
  pull_request:
    branches: [ "master" ]

env:
  DOTNET_VERSION: 8.0.x 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Redis
        run: sudo apt-get install -y redis-tools redis-server

      - name: Verify Redis
        run: redis-cli ping

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-restore --no-build --configuration Release --verbosity normal /p:CollectCoverage=true /p:Threshold=0 /p:ThresholdStat=total
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build --tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest --build-arg BUILD_CONFIGURATION=Release --build-arg HTTP_PORT=7465 --build-arg HTTPS_PORT=7466 --file src/API/SFC.Data.Api/Dockerfile .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest